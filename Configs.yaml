    - name: CameraModelPosOffsetZ
      label: カメラ位置補正Z(m)
      group: Cheki カメラ
      type: float
      default: 0.05
      range: [-0.2, 0.2]
      description: カメラモデルの手元からの位置補正Z(前+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: CameraModelRotOffsetX
      label: カメラ回転補正X(度)
      group: Cheki カメラ
      type: float
      default: -90
      range: [-180, 180]
      description: カメラモデルの回転補正X(pitch)。モデルの前方軸とgrip pose軸の差を実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: CameraModelRotOffsetY
      label: カメラ回転補正Y(度)
      group: Cheki カメラ
      type: float
      default: -180
      range: [-180, 180]
