      label: カメラ回転補正Z(度)
      group: Cheki カメラ
      type: float
      default: 0.0
      range: [-180, 180]
      description: カメラモデルの回転補正Z(roll)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: CameraModelScale
