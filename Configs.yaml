      description: カラオケ ミニゲーム中、手元モデルを左手タンバリン/右手サイリウムに自動スワップする。見た目のみ(入力・レーザーは不変)。終了で自動復帰。要 ShowControllerModel=ON。
      ui: { kind: toggle }

    - name: KaraokeShakeEnabled
      label: カラオケ振り入力
      group: カラオケ楽器
      type: bool
      default: true
      description: カラオケ中、左コントローラ振り→タンバリン(ZL)・右コントローラ振り→ガヤ(ZR) で音符を叩く。持ち上げ(上向き)では反応しない。
      ui: { kind: toggle }

    - name: KaraokeShakeThreshold
      label: 振り検知しきい値
      group: カラオケ楽器
      type: float
      default: 2.0
      range: [0.2, 8.0]
      description: 発火しきい値(下/前の線速度 m/s + 角速度×重み の混合スコア)。低いほど敏感。実機で調整。
      ui: { kind: slider, step: 0.1, format: '{0:F1}' }

    - name: KaraokeShakeReleaseRatio
      label: 再武装比
      group: カラオケ楽器
      type: float
      default: 0.5
      range: [0.1, 0.9]
      description: 1スイング1発のための再武装しきい値 = 検知しきい値×この比。スコアがこれを下回ると次の振りを受付。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokeShakeRefractorySec
      label: 不応期(秒)
      group: カラオケ楽器
      type: float
      default: 0.12
      range: [0.0, 0.5]
      description: 発火後この秒数は次の発火を抑止(連打誤発火防止)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: KaraokeShakeDownWeight
      label: 下振り重み
      group: カラオケ楽器
      type: float
      default: 1.0
      range: [0.0, 3.0]
      description: 下向き線速度のスコア寄与。叩き下ろし主体にするなら高く。
      ui: { kind: slider, step: 0.1, format: '{0:F1}' }

    - name: KaraokeShakeForwardWeight
      label: 前振り重み
      group: カラオケ楽器
      type: float
      default: 1.0
      range: [0.0, 3.0]
      description: 前(ステージ)向き線速度のスコア寄与。前ジャブを拾う度合い。
      ui: { kind: slider, step: 0.1, format: '{0:F1}' }

    - name: KaraokeShakeAngularWeight
      label: 手首スナップ重み
      group: カラオケ楽器
      type: float
      default: 0.1
      range: [0.0, 0.5]
      description: 角速度(rad/s) magnitude のスコア寄与。手首だけで振る動作を拾う。過敏なら 0 で無効化。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: KaraokeShakeLiftVetoSpeed
      label: 持ち上げveto速度(m/s)
      group: カラオケ楽器
      type: float
      default: 0.3
      range: [0.0, 2.0]
      description: 上向き速度がこの値を超える間は手首スナップ(角速度)項を無効化し、持ち上げ中の手首回転での誤発火を防ぐ。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokeShakeSmoothing
      label: 振り平滑(EMA)
      group: カラオケ楽器
      type: float
      default: 0.5
      range: [0.1, 1.0]
      description: 速度の EMA 係数(1=平滑なし)。低いほどジッタに強いが遅延増。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokeHapticAmplitude
      label: ヒット振動の強さ
      group: カラオケ楽器
      type: float
      default: 0.5
      range: [0.0, 1.0]
      description: 音符ヒット時のコントローラ振動の振幅(0=無効)。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokeHapticDurationSec
      label: ヒット振動の長さ(秒)
      group: カラオケ楽器
      type: float
      default: 0.05
      range: [0.0, 0.3]
      description: 音符ヒット時の振動の持続時間。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: KaraokeTambPosOffsetX
      label: タンバリン位置補正X(m)
      group: カラオケ楽器
      type: float
      default: 0.0
      range: [-0.2, 0.2]
      description: 左手タンバリンの手元からの位置補正X(右+)。モデル原点とOpenXR grip原点の差を実機で詰める。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: KaraokeTambPosOffsetY
      label: タンバリン位置補正Y(m)
      group: カラオケ楽器
      type: float
      default: 0.0
      range: [-0.2, 0.2]
      description: 左手タンバリンの手元からの位置補正Y(上+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: KaraokeTambPosOffsetZ
      label: タンバリン位置補正Z(m)
      group: カラオケ楽器
      type: float
      default: 0.06
      range: [-0.2, 0.2]
      description: 左手タンバリンの手元からの位置補正Z(前+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: KaraokeTambRotOffsetX
      label: タンバリン回転補正X(度)
      group: カラオケ楽器
      type: float
      default: -2
      range: [-180, 180]
      description: 左手タンバリンの回転補正X(pitch)。モデルの軸とgrip pose軸の差を実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: KaraokeTambRotOffsetY
      label: タンバリン回転補正Y(度)
      group: カラオケ楽器
      type: float
      default: -4
      range: [-180, 180]
      description: 左手タンバリンの回転補正Y(yaw)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: KaraokeTambRotOffsetZ
      label: タンバリン回転補正Z(度)
      group: カラオケ楽器
      type: float
      default: -85
      range: [-180, 180]
      description: 左手タンバリンの回転補正Z(roll)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: KaraokeTambScale
      label: タンバリン拡大率
      group: カラオケ楽器
      type: float
      default: 1.0
      range: [0.1, 3.0]
      description: 左手タンバリンの拡大率。コード側base補正後の微調整(1.0で実寸目安)。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokeGlowPosOffsetX
      label: サイリウム位置補正X(m)
      group: カラオケ楽器
      type: float
      default: 0.01
      range: [-0.2, 0.2]
      description: 右手サイリウムの手元からの位置補正X(右+)。モデル原点とOpenXR grip原点の差を実機で詰める。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: KaraokeGlowPosOffsetY
      label: サイリウム位置補正Y(m)
      group: カラオケ楽器
      type: float
      default: -0.015
      range: [-0.2, 0.2]
      description: 右手サイリウムの手元からの位置補正Y(上+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: KaraokeGlowPosOffsetZ
      label: サイリウム位置補正Z(m)
      group: カラオケ楽器
      type: float
      default: -0.045
      range: [-0.2, 0.2]
      description: 右手サイリウムの手元からの位置補正Z(前+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: KaraokeGlowRotOffsetX
      label: サイリウム回転補正X(度)
      group: カラオケ楽器
      type: float
      default: -99
      range: [-180, 180]
      description: 右手サイリウムの回転補正X(pitch)。モデルの軸とgrip pose軸の差を実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: KaraokeGlowRotOffsetY
      label: サイリウム回転補正Y(度)
      group: カラオケ楽器
      type: float
      default: 173
      range: [-180, 180]
      description: 右手サイリウムの回転補正Y(yaw)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: KaraokeGlowRotOffsetZ
      label: サイリウム回転補正Z(度)
      group: カラオケ楽器
      type: float
      default: 0
      range: [-180, 180]
      description: 右手サイリウムの回転補正Z(roll)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: KaraokeGlowScale
      label: サイリウム拡大率
      group: カラオケ楽器
      type: float
      default: 1.3
      range: [0.1, 3.0]
      description: 右手サイリウムの拡大率。コード側base補正後の微調整(1.0で実寸目安)。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokeGlowEmission
      label: サイリウム発光強度
      group: カラオケ楽器
      type: float
      default: 1
      range: [0.0, 6.0]
      description: 右手サイリウム発光部(チューブ)のHDR発光強度。素色×この値を毎フレ書き、内部HDRバッファ経由でBloomに拾われ発光する。0で発光オフ。
      ui: { kind: slider, step: 0.1, format: '{0:F1}' }

    - name: KaraokeGlowSaturationThreshold
      label: サイリウム発光彩度しきい値
      group: カラオケ楽器
      type: float
      default: 0.35
      range: [0.0, 1.0]
      description: サイリウムで発光させる「ピンク部分」を選ぶ彩度しきい値。彩度がこの値以上のsubmeshだけ発光する。下げるとCore(薄ピンク)も発光する。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: KaraokePropBrightness
      label: カラオケ楽器の明るさ
      group: カラオケ楽器
      type: float
      default: 1
      range: [0.1, 3.0]
      description: タンバリン/サイリウムのアニメ調描画の明るさ。手と共有のglobal light(0.63)による暗化を補正する。コントローラ/カメラとは独立。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokePropShadeFactor
      label: カラオケ楽器の影の濃さ
      group: カラオケ楽器
      type: float
      default: 1
      range: [0.0, 1.0]
      description: タンバリン/サイリウムのアニメ調の影色。素色×この値が影色になる。小さいほど影が濃い(1.0で影なし)。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: KaraokePropShadeFeather
      label: カラオケ楽器の影境界フェード
      group: カラオケ楽器
      type: float
      default: 0.1
      range: [0.0, 0.5]
      description: タンバリン/サイリウムの影と光の境界のなめらかさ。0=くっきり2-tone、大きいほど境界がフェードする。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: KaraokePropOutlineEnabled
      label: カラオケ楽器のアウトライン
      group: カラオケ楽器
      type: bool
      default: true
      description: タンバリン/サイリウムにアニメ調のアウトライン(輪郭線)を描く。OFFで従来どおり輪郭なし。
      ui: { kind: toggle }

    - name: KaraokePropOutlineColorR
      label: 楽器アウトライン色R
      group: カラオケ楽器
      type: float
      default: 0.05
      range: [0.0, 1.0]
      description: タンバリン/サイリウムのアウトライン色(R成分)。F10でlive反映。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: KaraokePropOutlineColorG
      label: 楽器アウトライン色G
      group: カラオケ楽器
      type: float
      default: 0.05
      range: [0.0, 1.0]
      description: タンバリン/サイリウムのアウトライン色(G成分)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: KaraokePropOutlineColorB
      label: 楽器アウトライン色B
      group: カラオケ楽器
      type: float
      default: 0.05
      range: [0.0, 1.0]
      description: タンバリン/サイリウムのアウトライン色(B成分)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: KaraokePropOutlineWidth
      label: 楽器アウトライン太さ(m)
      group: カラオケ楽器
      type: float
      default: 0.0006
      range: [0.0, 0.02]
      description: タンバリン/サイリウムのアウトラインの太さ(メートル・world space)。0で消える。実機live調整用(0.2mm刻み)。
      ui: { kind: slider, step: 0.0002, format: '{0:F4}m' }

    - name: HandSumoPushEnabled
      label: 手押し相撲 押し出し入力
      group: 手押し相撲
      type: bool
      default: true
      description: 手押し相撲中、両手を前に出す動作でクリック判定を発火する。両手同時のみ（片手では発火しない）。A ボタンでも従来どおりクリック可。
      ui: { kind: toggle }

    - name: ShowHandSumoHands
      label: 手押し相撲 両手ハンド固定
      group: 手押し相撲
      type: bool
      default: true
      description: 手押し相撲中、両手モデルをハンドに固定する（見た目のみ。両手非コントローラ＝レーザーは終始 suppress）。要 ShowControllerModel=ON。終了で自動復帰。
      ui: { kind: toggle }

    - name: HandSumoPushThreshold
      label: 押し出し検知しきい値(m/s)
      group: 手押し相撲
      type: float
      default: 0.7
      range: [0.1, 3.0]
      description: 前進(前方向)線速度の発火しきい値。低いほど軽い押しで反応。実機で調整。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandSumoPushReleaseRatio
      label: 再武装比
      group: 手押し相撲
      type: float
      default: 0.5
      range: [0.1, 0.9]
      description: 1 押し 1 発のための再武装しきい値 = 検知しきい値×この比。両手の前進速度がこれを下回ると次の押し出しを受付。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandSumoPushRefractorySec
      label: 不応期(秒)
      group: 手押し相撲
      type: float
      default: 0.3
      range: [0.0, 1.0]
      description: 発火後この秒数は次の発火を抑止（連打誤発火防止）。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: HandSumoPushCoincidenceSec
      label: 両手同時性窓(秒)
      group: 手押し相撲
      type: float
      default: 0.25
      range: [0.05, 1.0]
      description: 片手が前進してからこの秒数以内にもう片手も前進したとき「両手押し出し」とみなす。長いほど同時性が緩い。両手同時を厳密にしたいなら不応期(既定0.3)以下に保つ。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: HandSumoPushSmoothing
      label: 押し出し平滑(EMA)
      group: 手押し相撲
      type: float
      default: 0.5
      range: [0.1, 1.0]
      description: 前進速度の EMA 係数（1=平滑なし）。低いほどジッタに強いが遅延増。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandSumoHapticAmplitude
      label: 押し出し振動の強さ
      group: 手押し相撲
      type: float
      default: 0.5
      range: [0.0, 1.0]
      description: 押し出しヒット時のコントローラ振動の振幅（0=無効）。両手に与える。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandSumoHapticDurationSec
      label: 押し出し振動の長さ(秒)
      group: 手押し相撲
      type: float
      default: 0.05
      range: [0.0, 0.3]
      description: 押し出しヒット時の振動の持続時間。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

