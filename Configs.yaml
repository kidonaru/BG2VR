      range: [-180, 180]
      description: instax ビューファインダカメラの回転補正X(pitch)。コントローラ前方とレンズ光軸の差を実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: ChekiCamRotOffsetY
      label: VFカメラ回転補正Y(度)
      group: Cheki カメラ
      type: float
      default: 0.0
      range: [-180, 180]
      description: instax ビューファインダカメラの回転補正Y(yaw)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: ChekiCamRotOffsetZ
