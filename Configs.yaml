      label: 食べさせの握り具合
      group: あ〜んゲーム
      type: float
      default: 0.7
      range: [0.0, 1.0]
      description: 食べさせ側(ForCast)で右手をハンドモデルにしたときの指の握り込み量（0=開き / 1=完全に握る）。食べ物を持つ見た目に調整する。要「指を曲げる」ON。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    # ── group: ドリンクグラス ────────────────
    - name: ShowDrinkGlass
      label: ドリンクグラス複製表示
      group: ドリンクグラス
      type: bool
      default: true
      description: NPCがグラス/カクテルを手に持っている間、設定手の手元モデルをハンドにして同じグラスの複製を持たせる。OFFで無効。
      ui: { kind: toggle }

    - name: DrinkGlassLeftHand
      label: グラスは左手
      group: ドリンクグラス
      type: bool
      default: false
      description: 複製グラスを持つ手。OFF=右手 / ON=左手。位置補正は右手基準で定義しX反転で左手へ対称適用する。
      ui: { kind: toggle }

    - name: DrinkGlassUseGameMaterial
      label: 実マテリアルを使う
      group: ドリンクグラス
      type: bool
      default: true
      description: ON=ゲームの実マテリアルで描画(透明感が出る・既定)。OFF=不透明近似(ControllerUnlit+実テクスチャ/色)で確実に表示。環境によってはグラスのマテリアルがURP/LitでVR両眼で黒化しシェルが見えなくなるため、その場合はOFF。
      ui: { kind: toggle }

    - name: DrinkGlassPosOffsetX
      label: グラス位置補正X(m)
      group: ドリンクグラス
      type: float
      default: 0.045
      range: [-0.2, 0.2]
      description: 複製グラスの手元からの位置補正X(右+)。手の中の収まりを実機で詰める。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: DrinkGlassPosOffsetY
      label: グラス位置補正Y(m)
      group: ドリンクグラス
      type: float
      default: 0.025
      range: [-0.2, 0.2]
      description: 複製グラスの手元からの位置補正Y(上+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: DrinkGlassPosOffsetZ
      label: グラス位置補正Z(m)
      group: ドリンクグラス
      type: float
      default: 0.055
      range: [-0.2, 0.2]
      description: 複製グラスの手元からの位置補正Z(前+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: DrinkGlassRotOffsetX
      label: グラス回転補正X(度)
      group: ドリンクグラス
      type: float
      default: 70
      range: [-180, 180]
      description: 複製グラスの回転補正X(pitch)。メッシュ原点とgrip pose軸の差を実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: DrinkGlassRotOffsetY
      label: グラス回転補正Y(度)
      group: ドリンクグラス
      type: float
      default: 17
      range: [-180, 180]
      description: 複製グラスの回転補正Y(yaw)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: DrinkGlassRotOffsetZ
      label: グラス回転補正Z(度)
      group: ドリンクグラス
      type: float
      default: 0
      range: [-180, 180]
      description: 複製グラスの回転補正Z(roll)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: DrinkGlassScale
      label: グラス拡大率
      group: ドリンクグラス
      type: float
      default: 1.35
      range: [0.1, 3.0]
      description: 複製グラスの拡大率。ベイクメッシュは実ゲーム単位＝1.0で実寸。大きすぎ/小さすぎる時に調整。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: DrinkGlassGripCurl
      label: グラスの握り具合
      group: ドリンクグラス
      type: float
      default: 0.85
      range: [0.0, 1.0]
      description: グラスを持つ手をハンドモデルにしたときの指の握り込み量（0=開き / 1=完全に握る）。グラスを握る見た目に調整する。要「指を曲げる」ON。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    # ── group: カルタ ────────────────
    - name: KarutaStickEnabled
      label: カルタ取りをスティックに割当
      group: カルタ
      type: bool
      default: true
      description: カルタ合戦の札取りを左右スティックの4方向に割り当てる（左スティック=十字キーの札 / 右スティック=顔ボタンの札）。OFFで従来挙動のまま。
      ui: { kind: toggle }

    - name: KarutaStickThreshold
      label: カルタ取り判定しきい値
      group: カルタ
      type: float
      default: 0.5
      range: [0.2, 0.8]
      description: スティックを札取りと判定する倒し量。小さいほど浅い傾けで取れる。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

- section: VrFade
  name: VR フェード
  configs:
    - name: EnableVrFade
      label: VR フェード同期
      type: bool
      default: true
      description: シーン遷移等のゲーム画面フェード(暗転/ホワイトアウト)を VR(HMD)側にも同期する。
      ui: { kind: toggle }

    - name: EnableVrTransitionOverlay
      label: VR トランジション絵柄
      type: bool
      default: true
      description: シーン遷移の絵柄トランジションを VR(HMD)側にも overlay 表示する。OFF 時は白フェードのみ。
      ui: { kind: toggle }

    - name: VrTransitionOverlayWidth
      label: トランジション絵柄の幅(m)
      type: float
      default: 4.5
      range: [0.5, 8.0]
      description: 遷移絵柄 overlay の横幅(メートル)。大きいほど視界を覆う。
      ui: { kind: slider, step: 0.1, format: '{0:F1}m' }

    - name: VrTransitionOverlayDistance
      label: トランジション絵柄の距離(m)
      type: float
      default: 1.5
      range: [0.5, 5.0]
      description: 遷移絵柄 overlay の HMD からの距離(メートル)。
      ui: { kind: slider, step: 0.1, format: '{0:F1}m' }

- section: Locomotion
  name: VR 移動
  configs:
    - name: EnableGrabMove
      label: Grip 移動
      type: bool
      default: true
      description: コントローラの Grip ボタンで空間を掴んでカメラを移動・yaw 回転する。両手 Grip 1 秒長押しで移動量をリセット。
      ui: { kind: toggle }

    - name: EnableStickMove
      label: Grip+スティック平行移動
      type: bool
      default: true
      description: Grip を握りながら同じ手のスティックを倒すと頭の向き基準で水平に平行移動する。Grip 中はそのスティックの方向キー/カメラ操作は無効。掴み移動と併用可・両手 Grip 1 秒で移動量をリセット。
      ui: { kind: toggle }

    - name: StickMoveSpeed
      label: 平行移動速度(m/s)
      type: float
      default: 1.5
      range: [0.2, 5.0]
      description: Grip+スティック平行移動の速さ(メートル/秒)。
      ui: { kind: slider, step: 0.1, format: '{0:F1}' }

    - name: StickMoveDeadzone
      label: 平行移動デッドゾーン
      type: float
      default: 0.15
      range: [0.0, 0.5]
      description: Grip+スティック平行移動の不感帯。これ未満の倒し量は移動しない。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: GrabMoveSmoothingTau
      label: Grip 移動の平滑時間(秒)
      type: float
      default: 0.15
      range: [0, 0.5]
      description: Grip 移動とパネル移動ドラッグの手振れ平滑(EMA)の時定数(秒)。大きいほど滑らかだが追従遅延が増える。0=無効。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: FollowCameraPosition
      label: カメラ位置追従
      type: bool
      default: true
      description: ゲーム本体カメラの移動に VR 視点を追従させる（回転は追従しない）。
      ui: { kind: toggle }

    - name: ScenePinnedPose
      label: シーン固定位置
      type: bool
      default: true
      description: 保存したシーンでは VR 視点を固定位置に配置しカメラ追従を停止する。OFF で全シーンをカメラ追従に戻す（保存データは保持）。未保存シーンと鉄骨ミニゲームは常にカメラ追従。
      ui: { kind: toggle }

    - name: SavePinnedPose
      label: 現在位置をこのシーンに保存
      key: SavePinnedPose
      type: hotkey
      defaultKey: S
      defaultButton: None
      description: 今の VR 視点位置を保存する（次回入場時に復元）。ミニゲーム中はそのミニゲーム単位で保存される（同じシーンの別ミニゲームと位置を共有しない）。修飾キー（既定 Alt）を押しながら設定キー（既定 S）。
      ui:
        kind: keybinding

    - name: ClearPinnedPose
      label: このシーンの保存位置を消去
      key: ClearPinnedPose
      type: hotkey
      defaultKey: D
      defaultButton: None
      description: 保存位置を消去しカメラ追従に戻す（ミニゲーム中はそのミニゲーム単位で消去）。修飾キー（既定 Alt）を押しながら設定キー（既定 D）。
      ui:
        kind: keybinding

    - name: PinnedPoseModifier
      label: 固定位置ホットキーの修飾キー
      type: enum
      enumType: BG2VR.Utils.KeyboardModifier
      default: Alt
      description: 固定位置の保存/消去ホットキーに使う修飾キー（Ctrl/Alt/Shift）。保存/消去キー（既定 S/D）と組み合わせて押す。Save/Clear 共通。
      ui:
        kind: dropdown

    - name: ScenePinnedFadeHold
      label: 固定位置の遷移フェード保持
      type: bool
      default: true
      description: 固定位置シーンへの遷移後、カメラ位置が安定するまで VR の黒フェードを保持して数フレームのズレを隠す。未保存シーンへの遷移は環境が判明し次第すぐ明ける。
      ui: { kind: toggle }

    - name: ScenePinnedFadeHoldSettleSec
      label: フェード保持の追加時間(秒)
      type: float
      default: 0.15
      range: [0, 1.0]
      description: 固定位置を適用してからフェードを明けるまでの追加保持時間（秒）。大きいほど遷移直後のチラつきを確実に隠すが、遷移明けが遅く感じる。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: ShowPinnedPoseToast
      label: 固定位置の保存/消去を通知
      type: bool
      default: true
      description: 固定位置を保存/消去したとき、ゲームのダイアログで「位置を保存しました」等を通知する。OFF で通知しない（保存自体は動作）。
      ui: { kind: toggle }

    - name: PinnedPoseToastSec
      label: 通知の表示秒数
      type: float
      default: 2.0
      range: [0.5, 5.0]
      description: 固定位置の保存/消去通知を自動的に閉じるまでの秒数。OK を押せば早く閉じられる。
      ui: { kind: slider, step: 0.1, format: '{0:F1}s' }

- section: Talk2D
  name: 2D背景イベント (VR)
  configs:
    - name: EnableTalk2DBackdrop
      label: 背景の遠景化+周辺暗転
      type: bool
      default: true
      description: VR 中、2D背景イベント（同伴・デート等）の背景写真を遠方へ押し出して遠景化し、写真の外側を暗くする。見た目の構図は変わらない。
      ui: { kind: toggle }

    - name: Talk2DBackdropDistanceMul
      label: 背景距離倍率
      type: float
      default: 4.0
      range: [1.0, 8.0]
      description: 背景写真をカメラ基準で何倍の距離へ押し出すか。遠いほど書き割り感が消える。1=押し出しなし。
      ui: { kind: slider, step: 0.5, format: '{0:F1}x' }

    - name: Talk2DVoidBrightness
      label: 周辺の明るさ
      type: float
      default: 0.1
      range: [0, 0.3]
      description: 写真の外側を塗りつぶす暗グレーの明るさ。0=真っ黒。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

- section: UiSceneVoid
  name: メニュー画面 (VR)
  configs:
    - name: EnableUiSceneVoid
      label: メニュー中の3D非表示
      type: bool
      default: true
      description: VR 中、ホーム画面などフルスクリーン UI の画面で、裏に残っている 3D シーン（バー店内等）を非表示にして暗い背景にする。
      ui: { kind: toggle }

    - name: UiSceneVoidBrightness
      label: 背景の明るさ
      type: float
      default: 0.1
      range: [0, 0.3]
      description: 3D 非表示中の背景の明るさ。0=真っ黒。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

- section: HeadLook
  name: 視線・顔向け
  configs:
    - name: EnableHeadLook
      label: 顔を HMD に向ける
      type: bool
      default: true
      description: VR 中、キャラの顔（首）がプレイヤーの頭（HMD）の方を向く。正面から大きく外れた位置には追従しない。
      ui: { kind: toggle }

    - name: EnableEyeLook
      label: 目を HMD に向ける
      type: bool
      default: true
      description: VR 中、キャラの目（虹彩）がプレイヤーの頭（HMD）を追う。
      ui: { kind: toggle }

    # ── group: 首の動き ──────────────────────────
    - name: HeadRatio
      label: 首の追従強さ
      group: 首の動き
      type: float
      default: 0.5
      range: [0.0, 1.0]
      description: ターゲット方向への計算角のうち首を向ける割合。大きいほど顔がしっかりこちらを向く（1.0 = 真正面まで向く）。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HeadTau
      label: 首の動きの滑らかさ(秒)
      group: 首の動き
      type: float
      default: 0.30
      range: [0.1, 1.0]
      description: 首の追従の時定数。大きいほどゆったり動く。小さすぎるとガクつく。
      ui: { kind: slider, step: 0.05, format: '{0:F2}s' }

    - name: DeadZoneStartDeg
      label: 首デッドゾーン(度)
      group: 首の動き
      type: float
      default: 10
      range: [0, 30]
      description: 首がターゲットからこの角度以上ズレたら動き始める。小さいほど敏感に追従するがガクつきやすい。
      ui: { kind: slider, step: 1, format: '{0:0}°' }

    - name: DeadZoneStopDeg
      label: 首停止しきい値(度)
      group: 首の動き
      type: float
      default: 1
      range: [0, 10]
      description: 首のズレがこの角度以下になったら停止する（パタつき防止）。首デッドゾーン(度) を超える値は内部で丸められる。
      ui: { kind: slider, step: 0.5, format: '{0:F1}°' }

    # ── group: 目の動き ──────────────────────────
    - name: EyeYawRatio
      label: 目の追従強さ(左右)
      group: 目の動き
      type: float
      default: 0.2
      range: [0.0, 0.5]
      description: ターゲット方向への計算角のうち目（虹彩）を左右に向ける割合。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: EyePitchRatio
      label: 目の追従強さ(上下)
      group: 目の動き
      type: float
      default: 0.1
      range: [0.0, 0.5]
      description: ターゲット方向への計算角のうち目（虹彩）を上下に向ける割合。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: EyeTau
      label: 目の吸着時間(秒)
      group: 目の動き
      type: float
      default: 0.025
      range: [0.01, 0.2]
      description: 目（虹彩）の追従の時定数。小さいほど瞬時に吸着する。
      ui: { kind: slider, step: 0.005, format: '{0:F3}s' }

    - name: EyeUvPerDeg
      label: 目の追従強さ(UV係数)
      group: 目の動き
      type: float
      default: 0.013
      range: [0.002, 0.02]
      description: 眼球角(度)を虹彩の移動量(UV)へ換算する係数。大きいほど目が大きく動く。
      ui: { kind: slider, step: 0.001, format: '{0:F3}' }

    - name: EyeUvMax
      label: 虹彩の可動限界(UV)
      group: 目の動き
      type: float
      default: 0.15
      range: [0.02, 0.2]
      description: 虹彩の移動量(UV)の上限。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    # ── group: 追従範囲 ──────────────────────────
    - name: EngageYawDeg
      label: 追従範囲(左右)(度)
      group: 追従範囲
      type: float
      default: 45
      range: [20, 90]
      description: HMD が顔の正面からこの角度（左右）以内に入ると追従を開始する。解除は「解除マージン(左右)」だけ外側（パタつき防止のヒステリシス）。
      ui: { kind: slider, step: 5, format: '{0:0}°' }

    - name: EngagePitchDeg
      label: 追従範囲(上下)(度)
      group: 追従範囲
      type: float
      default: 45
      range: [30, 90]
      description: HMD が顔の正面からこの角度（上下）以内に入ると追従を開始する。解除は「解除マージン(上下)」だけ外側（パタつき防止のヒステリシス）。
      ui: { kind: slider, step: 5, format: '{0:0}°' }

    - name: ReleaseYawMarginDeg
      label: 解除マージン(左右)(度)
      group: 追従範囲
      type: float
      default: 20
      range: [5, 45]
      description: 追従解除の境界 = 追従範囲(左右) + これ。ヒステリシス幅。小さいほど境界付近でパタつきやすい。
      ui: { kind: slider, step: 5, format: '{0:0}°' }

    - name: ReleasePitchMarginDeg
      label: 解除マージン(上下)(度)
      group: 追従範囲
      type: float
      default: 20
      range: [5, 45]
      description: 追従解除の境界 = 追従範囲(上下) + これ。ヒステリシス幅。小さいほど境界付近でパタつきやすい。
      ui: { kind: slider, step: 5, format: '{0:0}°' }

- section: SpatialVoice
  name: Spatial Voice
  configs:
    - name: VrSpatialVoice
      label: 空間化ボイス
      type: bool
      default: true
      description: VR 中、キャストのボイスを真の HRTF（バイノーラル）で空間化する。頭を向けると定位が動き、上下・前後・頭外定位（externalization）まで出る。本体 voice をミュートして専用ソースへミラーするため、非 VR / OFF / native 失敗時は素の 2D（回帰なし）。
      ui: { kind: toggle }

    - name: VoiceHrtfSpatialBlend
      label: 空間化ブレンド
      type: float
      default: 1.0
      range: [0.0, 1.0]
      description: HRTF の空間化度合い（Steam Audio の spatialBlend 直結）。1=完全空間化 / 0=非空間化寄り（明瞭度重視）。聞き取りづらければ下げる。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: VoiceMinDistance
      label: 減衰開始距離(m)
      type: float
      default: 0.5
      range: [0.0, 5.0]
      description: この距離（HMD からキャストの口元まで）以内は距離減衰なし。rig の World Scale で実効距離が変わるため実機で詰める。
      ui: { kind: slider, step: 0.1, format: '{0:F2}m' }

    - name: VoiceMaxDistance
      label: 減衰しきる距離(m)
      type: float
      default: 8.0
      range: [1.0, 30.0]
      description: この距離以遠でボイスが減衰しきる（無音）。減衰開始距離との間は線形。キャストが遠いシーンで無音にならないよう実機で詰める。
      ui: { kind: slider, step: 0.5, format: '{0:F1}m' }

    - name: VoiceMouthForwardOffset
      label: 口元前方オフセット(m)
      type: float
      default: 0.1
      range: [-0.3, 0.5]
      description: 頭ボーン位置から口元への前方オフセット。音源位置を顔の前方へずらして定位を自然にする。
      ui: { kind: slider, step: 0.01, format: '{0:F2}m' }
