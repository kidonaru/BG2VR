    - name: AhhnFoodHandRotOffsetY
      label: 食べ物の手回転Y(度)
      group: あ〜んゲーム
      type: float
      default: 0.0
      range: [-180, 180]
      description: 食べさせ側(ForCast)で食べ物の向き回転オフセット（手ローカルY・度）。
      ui: { kind: slider, step: 5, format: '{0:0}°' }

    - name: AhhnFoodHandRotOffsetZ
      label: 食べ物の手回転Z(度)
      group: あ〜んゲーム
      type: float
      default: 0.0
      range: [-180, 180]
      description: 食べさせ側(ForCast)で食べ物の向き回転オフセット（手ローカルZ・度）。
      ui: { kind: slider, step: 5, format: '{0:0}°' }

    - name: AhhnForCastEatDistance
      label: 食べさせ判定距離(m)
      group: あ〜んゲーム
