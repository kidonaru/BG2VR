      group: Cheki カメラ
      type: float
      default: 0.0
      range: [-180, 180]
      description: 背面画面の回転補正Y(yaw)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: ChekiScreenRotOffsetZ
      label: 背面画面 回転Z(度)
      group: Cheki カメラ
      type: float
      default: 0.0
      range: [-180, 180]
      description: 背面画面の回転補正Z(roll)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

