# BG2VR の BepInEx Config 宣言（source of truth）。
# tools/ConfigGen が MSBuild ビルド時に Generated/Configs.g.cs と docs/configs.md を生成する。
# section/key は既存 .cfg（com.BG2VR.cfg）と一致を保つこと（旧 Bg2VrConfig からの移行互換）。
# label は必須・name 直下。生成コードの XML doc と .cfg description 1 行目に使われる。
# comfort スライダー本体（World Scale / 目の高さ）は UnityVRMod ConfigElement 直結のため
# ここ（ConfigEntry 生成）には含めず、実行時に ComfortEntries で SettingsView へ注入する。

- section: Comfort
  name: VR Comfort
  configs:
    - name: SuppressDizzyCamera
      label: 酔いカメラ抑制
      type: bool
      default: true
      description: VR 中、プレイヤー酩酊時の酔いカメラ回転（揺れ）を抑制する。
      ui: { kind: toggle }

    - name: VrDesktopLowRes
      label: VR中デスクトップ低解像度
      type: bool
      default: false
      description: VR 描画中、モニタ（デスクトップ）側のフルスクリーン解像度を下げて GPU 負荷を減らす。HMD の描画解像度には影響しない。VR 終了で元の解像度へ自動復元。フルスクリーン時のみ有効。
      ui: { kind: toggle }

    - name: VrDesktopWidth
      label: VR中デスクトップ幅(px)
      type: int
      default: 1280
      range: [480, 1920]
      description: VR 中に固定するデスクトップの横幅(px)。高さは 16:9 で自動算出（4px 単位に丸め）。小さいほど GPU 負荷が下がる（既定 1280×720）。
      ui:
        kind: slider
        step: 16
        format: '{0}px'

    # ── group: フレームペーシング ────────────────
    - name: UncapFrameRate
      label: VR 中 FPS 上限撤廃
      group: フレームペーシング
      type: bool
      default: true
      description: VR 中はフレームレート上限（ゲーム/FixMod が設定する targetFrameRate）を撤廃し vSync も OFF にして、HMD のリフレッシュレート同期に任せる。60fps キャップ起因のリプロジェクションちらつきを解消する。VR 終了時に元の値へ復元する。
      ui: { kind: toggle }

    - name: UncapFrameRateReassert
      label: 上限撤廃を毎フレーム維持
      group: フレームペーシング
      type: bool
      default: true
      description: 毎フレーム監視し、他 MOD やゲームがフレームレート上限を再設定しても打ち消す（ON の間、VR 中は FixMod の FPS 上限設定は効かない）。OFF では VR 開始時の 1 回のみ適用（ゲーム/FixMod とも起動時と設定変更時しか再設定しないため通常は 1 回で足りる）。
      ui: { kind: toggle }

    # ── group: 遷移ガード ────────────────
    - name: TransitionReattachDelaySec
      label: 遷移後 VR 復帰遅延(秒)
      group: 遷移ガード
      type: float
      default: 0
      range: [0, 10]
      description: シーン遷移完了後、VR rig の再 attach をこの秒数だけ遅らせる。0=即時。遷移直後のシーンロード GPU バーストと rig 再構築の初回 render が衝突してメインスレッドが固着する事象の回避（特に OpenXR の最重量遷移＝デート→Bar 等で実機 2026-06-10 hard hang を確認）。遅延中は HMD がグリッド表示になる。変更は即時反映。
      ui: { kind: slider, step: 0.5, format: '{0}s' }

    - name: TransitionRenderUntilUnload
      label: 遷移中フェードアウトをライブ描画
      group: 遷移ガード
      type: bool
      default: true
      description: ON=シーンのロード/アンロード直前まで VR rig を維持し、フェードアウトを実シーン上で描画する（凍結フレームのフェードを解消）。teardown は遷移内の最初のシーンロード直前まで遅延され、全黒到達後＝不可視に始まる。OFF=従来動作（遷移開始で即 teardown・フェードアウトは凍結フレーム上）。変更は即時反映。
      ui: { kind: toggle }

    - name: TransitionReattachOnFadeIn
      label: 遷移フェードインで先行復帰
      group: 遷移ガード
      type: bool
      default: true
      description: ON=シーン遷移のフェードイン開始（新シーン読込完了後）に VR rig を先行再 attach し、フェードインで新シーンを露出する（フェードインが旧シーンの凍結フレームを映し新シーンが完了後に pop する事象の解消）。OFF=従来動作（フェードイン完了後に再 attach）。変更は即時反映。
      ui: { kind: toggle }

- section: PostProcess
  name: ポストプロセス (VR)
  configs:
    - name: VrGamePostProcess
      label: ゲームのポスプロを反映
      type: bool
      default: true
      description: VR 両眼にゲームの URP post-process（カラーグレーディング + Bloom）を反映する。DepthOfField / ChromaticAberration は VR 快適性（酔い・レンズ補正二重がけ）のため常に除外する。デスクトップミラー側も VR 中は同様に DoF/CA が外れる。
      ui: { kind: toggle }

    - name: VrPostProcessVignette
      label: Vignette を残す
      type: bool
      default: true
      description: ゲームの周辺減光（Vignette）を VR にも残す。OFF で Vignette も除外する。
      ui: { kind: toggle }

    - name: VrPostProcessKeepUiCrisp
      label: UI を post から除外（くっきり）
      type: bool
      default: true
      description: VR の UI/レーザー/コントローラ等（オーバーレイ表示物）を post-process（グレーディング/Bloom）の対象外にしてくっきり表示する。OFF でシーンと同じく graded/bloom される。
      ui: { kind: toggle }

    - name: VrPostProcessBloomScale
      label: ブルーム強度
      type: float
      default: 0.5
      range: [0.0, 2.0]
      description: VR 両眼のブルーム強度をゲーム値に対する倍率で調整する。1.0 = ゲームと同一。0 でブルーム無効、>1 で強調。デスクトップミラー側も VR 中は同様に変わる。ゲームのポスプロ反映が ON のときのみ有効。
      ui: { kind: slider, step: 0.05, format: '{0:F2}x' }

- section: UI
  name: パネル
  configs:
    - name: UIScale
      label: UI スケール
      type: float
      default: 1.3
      range: [0.5, 2.0]
      description: 設定パネルの表示倍率。
      ui: { kind: slider, step: 0.1, format: '{0:F1}x' }

- section: WorldUI
  name: World UI (VR)
  configs:
    - name: WorldUiEnabled
      label: world UI 投影
      type: bool
      default: true
      description: VR 中、ゲーム UI(HUD/会話/選択肢/ダイアログ/BackLog)を world-space パネルに投影する。
      ui: { kind: toggle }

    - name: WorldUiLockOnTap
      label: タップで位置を固定
      type: bool
      default: false
      description: ON でポインタ手トリガーのタップ（または上ボタン）でパネル位置を固定する。OFF(既定)はタップしてもヘッド位置追従を継続する。
      ui: { kind: toggle }

    - name: WorldUiDistance
      label: パネル距離(m)
      type: float
      default: 0.49
      range: [0.3, 8.0]
      description: world UI パネルまでの水平距離(m)。移動ドラッグで自動更新される。
      ui: { kind: slider, step: 0.1, format: '{0:F1}m' }

    - name: WorldUiSize
      label: パネル幅(m)
      type: float
      default: 0.92
      range: [0.4, 3.0]
      description: world UI パネルの物理幅(m)。高さは 16:9 で自動算出。
      ui: { kind: slider, step: 0.1, format: '{0:F1}m' }

    - name: WorldUiVerticalOffset
      label: パネル上下位置(m)
      type: float
      default: -0.013
      range: [-2.0, 2.0]
      description: world UI パネルの上下位置(m)。- で下、+ で上。移動ドラッグで自動更新される。
      ui: { kind: slider, step: 0.05, format: '{0:F2}m' }

    - name: WorldUiYaw
      label: パネル左右角度
      type: float
      default: -0.36
      range: [-180, 180]
      description: パネルの正面からの左右回り込み角度(度)。+で右。移動ドラッグで自動更新される。
      ui: { kind: slider, step: 1, format: '{0:0}°' }

    - name: WorldUiUprightAngleDeg
      label: パネル直立維持角度
      type: float
      default: 20
      range: [0, 80]
      description: 視点からの仰角がこの角度(度)以内ならパネルを直立に保つ。超えた分だけ視点を向くように傾く。
      ui: { kind: slider, step: 1, format: '{0:0}°' }

    - name: WorldUiButtonSizeRatio
      label: 調整ボタンサイズ比率
      type: float
      default: 0.02
      range: [0.0, 0.2]
      description: パネル下の調整ボタン（移動/拡大/曲面）の辺の長さ＝視点距離×この比率 + 加算値（視角一定）。
      ui: { kind: slider, step: 0.002, format: '{0:F3}' }

    - name: WorldUiButtonSizeOffset
      label: 調整ボタンサイズ加算(m)
      type: float
      default: 0.04
      range: [0.0, 0.2]
      description: 調整ボタンの辺の長さへの加算値(m)。辺 = 視点距離×比率 + この値（0 未満にはならない）。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: EnableUiAdjustButtons
      label: パネル調整ボタン
      type: bool
      default: true
      description: レーザーをパネルに当てると下に移動/拡大/曲面ボタンを表示する。移動/拡大=ボタン上でトリガーを押したままドラッグ（移動中はスティック上下で押し引き）、曲面=クリックで切替。
      ui: { kind: toggle }

    - name: WorldUiCurved
      label: パネル曲面化
      type: bool
      default: true
      description: world UI パネルを視点を包む円筒曲面にする。パネル下の曲面ボタンと同期。
      ui: { kind: toggle }

    - name: WorldUiCurveRadius
      label: 曲面半径(m)
      type: float
      default: 2
      range: [1.0, 8.0]
      description: 曲面パネルの円筒半径(m)。小さいほど強く湾曲する。
      ui: { kind: slider, step: 0.1, format: '{0:F1}m' }

    - name: WorldUiDepthTest
      label: UI の depth test
      type: bool
      default: true
      description: ON（既定）で UI パネル/ボタン/レーザーが世界の物体（机・キャラ等）に隠れるようになる。OFF は常に最前面に描画。
      ui: { kind: toggle }

    - name: VrControllerOccludeUi
      label: コントローラが UI を遮る
      type: bool
      default: true
      description: ON でコントローラ/手元モデルだけが UI パネルを遮る（手前にあると UI が隠れる）。シーン（机・キャラ等）は UI を遮らない。レーザー/レティクルは常に最前面。ゲームのポスプロ反映 + UI くっきり が ON のときのみ有効。
      ui: { kind: toggle }

    - name: FixVrAdditiveEffects
      label: 加算エフェクト補正
      type: bool
      default: true
      description: VR で加算 UI エフェクト(UI/AddBlend)が黒矩形になる問題を、輝度キー材質へ差し替えて補正する。実機比較用に OFF 可。反映は次の画面 Setup/遷移から。
      ui: { kind: toggle }

- section: SettingsPanel
  name: 設定パネル (VR)
  configs:
    - name: SettingsPanelDistance
      label: 設定パネル距離(m)
      type: float
      default: 1.0
      range: [0.4, 3.0]
      description: VR 中に表示する設定パネル(F10)までの距離(m)。正面（シーン前方）に配置される。
      ui: { kind: slider, step: 0.05, format: '{0:F2}m' }

    - name: SettingsPanelSize
      label: 設定パネル幅(m)
      type: float
      default: 1.0
      range: [0.3, 2.5]
      description: VR 設定パネルの物理幅(m)。高さはパネルの縦横比から自動算出。
      ui: { kind: slider, step: 0.05, format: '{0:F2}m' }

    - name: SettingsToggleHoldSec
      label: 設定パネル開閉ホールド秒
      type: float
      default: 0.6
      range: [0.2, 2.0]
      description: 両スティック押し込みをこの秒数だけ保持すると VR 設定パネルを開閉する（誤爆防止）。
      ui: { kind: slider, step: 0.1, format: '{0:F1}s' }

    - name: SettingsNavRepeatDelay
      label: 設定ナビ連射 初動(秒)
      type: float
      default: 0.4
      range: [0.1, 1.0]
      description: 設定パネルでスティックを倒し続けたとき、最初の入力から連射が始まるまでの待ち時間(秒)。
      ui: { kind: slider, step: 0.05, format: '{0:F2}s' }

    - name: SettingsNavRepeatInterval
      label: 設定ナビ連射 間隔(秒)
      type: float
      default: 0.12
      range: [0.02, 0.5]
      description: 設定パネルでスティックを倒し続けたときの連射間隔(秒)。小さいほど速く送られる。
      ui: { kind: slider, step: 0.02, format: '{0:F2}s' }

    - name: SettingsScrollSpeed
      label: 設定スクロール速度(px/s)
      type: float
      default: 1200
      range: [200, 4000]
      description: VR 設定パネルを左スティック上下でスクロールする速度(px/秒)。大きいほど速くスクロールする。
      ui: { kind: slider, step: 100, format: '{0:F0}' }

- section: VrInput
  name: VR ポインタ
  configs:
    - name: EnableVrPointer
      label: VR ポインタ入力
      type: bool
      default: true
      description: VR コントローラのレーザーで world UI パネルを直接ポイント＆クリックする。
      ui: { kind: toggle }

    - name: SuppressMouseInVr
      label: VR中マウス無効
      type: bool
      default: true
      description: VR表示中は物理マウスの入力（UIホバー/クリック・カメラ操作）を無効化する。VR操作はコントローラで行うため通常はON。
      ui: { kind: toggle }

    - name: VrLaserVisible
      label: レーザー表示
      type: bool
      default: true
      description: コントローラからのレーザー線とレティクルを表示する。
      ui: { kind: toggle }

    - name: EnableVrButtons
      label: VR ボタン割当
      type: bool
      default: true
      description: VR コントローラのボタンをゲームパッド同等に割り当てる（A=決定 / B=戻る・長押しで再センター / X=バックログ / Y=既読スキップ / 右スティック=選択肢移動 / 左スティック=カメラ・アイテム回転 / 押し込み=オート切替）。OFF時は上ボタン=即時再センターのみ。
      ui: { kind: toggle }

    - name: EnableVrPauseButton
      label: メニューボタンでポーズ
      type: bool
      default: true
      description: 左コントローラのメニューボタンでポーズメニュー（ESC/Start 相当）を開閉する。VR ボタン割当とは独立して有効化できる。
      ui: { kind: toggle }

    - name: VrNavStickThreshold
      label: ナビ判定しきい値
      type: float
      default: 0.5
      range: [0.2, 0.8]
      description: 右スティックを方向入力（選択肢移動・メニュー操作）と判定する倒し量。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: VrRStickDeadzone
      label: 左スティックデッドゾーン
      type: float
      default: 0.15
      range: [0.0, 0.5]
      description: 左スティック（カメラ・アイテム回転）の注入を無視する倒し量。ドリフト防止。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    # ── group: レーザー・カーソル ────────────────
    - name: VrLaserPitchDeg
      label: レーザー下向き角度
      group: レーザー・カーソル
      type: float
      default: 40
      range: [-30, 90]
      description: コントローラに対するレーザーの下向きピッチ角(度)。手元から自然な下向きで出す。0=デバイス軸そのまま、負=上向き。
      ui: { kind: slider, step: 1, format: '{0:0}°' }

    - name: VrPointerSmoothingTau
      label: カーソル平滑時間(秒)
      group: レーザー・カーソル
      type: float
      default: 0.07
      range: [0, 0.3]
      description: ポインタ手ブレ平滑(EMA)の時定数(秒)。大きいほど滑らかだが追従遅延が増える。0=無効。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: VrLaserWidth
      label: レーザー太さ(m)
      group: レーザー・カーソル
      type: float
      default: 0.004
      range: [0.001, 0.02]
      description: レーザー線の始端の太さ(メートル)。終端へ向けて先細りになる。
      ui: { kind: slider, step: 0.001, format: '{0:F3}m' }

    - name: VrReticleSizeRatio
      label: レティクルサイズ比
      group: レーザー・カーソル
      type: float
      default: 0.025
      range: [0.005, 0.08]
      description: レティクル（照準リング）の大きさ。ヒット点までの距離×比率＝見かけサイズ一定。
      ui: { kind: slider, step: 0.005, format: '{0:F3}' }

    - name: VrLaserMissLength
      label: 非ヒット時レーザー長(m)
      group: レーザー・カーソル
      type: float
      default: 1.2
      range: [0.3, 3]
      description: UI 非ヒット時に表示するレーザーの長さ(メートル)。終端へ向けてフェードアウトする。
      ui: { kind: slider, step: 0.1, format: '{0:F1}m' }

    # ── group: トリガー凍結 ──────────────────────
    - name: VrFreezeOnset
      label: 凍結開始しきい値
      group: トリガー凍結
      type: float
      default: 0.05
      range: [0.02, 0.6]
      description: トリガーのアナログ押し込みがこの値を超えるとカーソルを凍結する。クリック確定(0.7)より小さくすること。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: VrFreezeRelease
      label: 凍結解除しきい値
      group: トリガー凍結
      type: float
      default: 0.02
      range: [0, 0.5]
      description: 押し込みがこの値以下に戻るとカーソル凍結を解除する。開始しきい値より大きい場合は開始しきい値に丸める。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: VrFreezeTimeout
      label: 凍結タイムアウト(秒)
      group: トリガー凍結
      type: float
      default: 0.3
      range: [0, 3]
      description: 凍結がこの時間続いたら自動解除する保険。解除後は一度トリガーを離すまで再凍結しない。0=タイムアウト無効。
      ui: { kind: slider, step: 0.1, format: '{0:F1}s' }

    - name: VrFreezeRecover
      label: 凍結復帰時間(秒)
      group: トリガー凍結
      type: float
      default: 0.15
      range: [0, 0.5]
      description: 凍結解除後、カーソルが現在の照準へ滑らかに戻る時間(秒)。0=即時(ワープ)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: ShowControllerModel
      label: コントローラモデル表示
      group: コントローラモデル
      type: bool
      default: true
      description: VR コントローラの公式 3D モデル（Meta Touch Plus）を両手に表示する。OFFで手元モデル全般(手モデル・Chekiカメラ含む)も非表示になる。
      ui: { kind: toggle }

    - name: CtrlModelPosOffsetX
      label: モデル位置補正X(m)
      group: コントローラモデル
      type: float
      default: 0.0
      range: [-0.2, 0.2]
      description: コントローラ3Dモデルの手元からの位置補正X(右+)。公式モデル原点とOpenXR grip原点の差を実機で詰める。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: CtrlModelPosOffsetY
      label: モデル位置補正Y(m)
      group: コントローラモデル
      type: float
      default: -0.015
      range: [-0.2, 0.2]
      description: コントローラ3Dモデルの手元からの位置補正Y(上+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: CtrlModelPosOffsetZ
      label: モデル位置補正Z(m)
      group: コントローラモデル
      type: float
      default: 0.05
      range: [-0.2, 0.2]
      description: コントローラ3Dモデルの手元からの位置補正Z(前+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: CtrlModelRotOffsetX
      label: モデル回転補正X(度)
      group: コントローラモデル
      type: float
      default: 68
      range: [-180, 180]
      description: コントローラ3Dモデルの回転補正X(pitch)。FBXの前方軸とgrip pose軸の差を実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: CtrlModelRotOffsetY
      label: モデル回転補正Y(度)
      group: コントローラモデル
      type: float
      default: 0.0
      range: [-180, 180]
      description: コントローラ3Dモデルの回転補正Y(yaw)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: CtrlModelRotOffsetZ
      label: モデル回転補正Z(度)
      group: コントローラモデル
      type: float
      default: 0.0
      range: [-180, 180]
      description: コントローラ3Dモデルの回転補正Z(roll)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: CtrlModelScale
      label: モデル拡大率
      group: コントローラモデル
      type: float
      default: 1.0
      range: [0.1, 3.0]
      description: コントローラ3Dモデルの拡大率。importで実寸が出る前提の安全弁。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: CtrlModelBrightness
      label: モデル明るさ
      group: コントローラモデル
      type: float
      default: 0.8
      range: [0.0, 1.0]
      description: 手元モデル（コントローラ/手/プロップ）の明るさ倍率。1.0=元の明るさ。下げるとモデルが暗くなりBloomのグローが弱まる（post-process反映層に置くため明るいと光って見える）。シーン側のBloomには影響しない。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandModelIsLeft
      label: 手モデルは左手
      group: 手モデル
      type: bool
      default: false
      description: 同梱手モデルFBXが左手かを示す(Player handは右手=OFF)。反対の手はX反転で生成。左右が逆になる場合はトグル。
      ui: { kind: toggle }

    - name: HandModelPosOffsetX
      label: 手位置補正X(m)
      group: 手モデル
      type: float
      default: 0.055
      range: [-0.2, 0.2]
      description: 手3Dモデルの手元からの位置補正X(右+)。手モデル原点とOpenXR grip原点の差を実機で詰める。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: HandModelPosOffsetY
      label: 手位置補正Y(m)
      group: 手モデル
      type: float
      default: 0.04
      range: [-0.2, 0.2]
      description: 手3Dモデルの手元からの位置補正Y(上+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: HandModelPosOffsetZ
      label: 手位置補正Z(m)
      group: 手モデル
      type: float
      default: -0.03
      range: [-0.2, 0.2]
      description: 手3Dモデルの手元からの位置補正Z(前+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: HandModelRotOffsetX
      label: 手回転補正X(度)
      group: 手モデル
      type: float
      default: 53
      range: [-180, 180]
      description: 手3Dモデルの回転補正X(pitch)。FBXの前方軸とgrip pose軸の差を実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: HandModelRotOffsetY
      label: 手回転補正Y(度)
      group: 手モデル
      type: float
      default: -13
      range: [-180, 180]
      description: 手3Dモデルの回転補正Y(yaw)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: HandModelRotOffsetZ
      label: 手回転補正Z(度)
      group: 手モデル
      type: float
      default: -8
      range: [-180, 180]
      description: 手3Dモデルの回転補正Z(roll)。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: HandModelScale
      label: 手拡大率
      group: 手モデル
      type: float
      default: 0.85
      range: [0.1, 3.0]
      description: 手3Dモデルの拡大率。コード側base補正(1.0)後の微調整(effective=本値×1.0)。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandModelBrightness
      label: 手モデル明るさ
      group: 手モデル
      type: float
      default: 1.0
      range: [0.0, 1.5]
      description: 手3Dモデル専用の明るさ倍率(1.0=元の肌色)。コントローラ等の他種別は CtrlModelBrightness を使う(別系統)。実機チューニング 2026-06-19 で手は 1.0 がちょうど良いことを確認。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandShadeFactor
      label: 手モデルの影の濃さ
      group: 手モデル
      type: float
      default: 1.0
      range: [0.0, 1.0]
      description: 手3Dモデルの影色の濃さ。素体(Cast)の影色×この値が影色になる。1.0=素体のまま、小さいほど影が濃い。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: HandShadeFeather
      label: 手モデルの影境界フェード
      group: 手モデル
      type: float
      default: 0.08
      range: [0.0, 0.5]
      description: 手3Dモデルの影と光の境界のなめらかさ。0=くっきり(従来どおり)、大きいほど境界がフェードする。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: HandOutlineEnabled
      label: 手モデルのアウトライン
      group: 手モデル
      type: bool
      default: true
      description: 手3Dモデルにアニメ調のアウトライン(輪郭線)を描く。OFFで従来どおり輪郭なし。
      ui: { kind: toggle }

    - name: HandOutlineColorR
      label: 手アウトライン色R
      group: 手モデル
      type: float
      default: 0.81
      range: [0.0, 1.0]
      description: 手モデルのアウトライン色(R成分)。F10でlive反映。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: HandOutlineColorG
      label: 手アウトライン色G
      group: 手モデル
      type: float
      default: 0.45
      range: [0.0, 1.0]
      description: 手モデルのアウトライン色(G成分)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: HandOutlineColorB
      label: 手アウトライン色B
      group: 手モデル
      type: float
      default: 0.4
      range: [0.0, 1.0]
      description: 手モデルのアウトライン色(B成分)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: HandOutlineWidth
      label: 手アウトライン太さ(m)
      group: 手モデル
      type: float
      default: 0.0008
      range: [0.0, 0.02]
      description: 手モデルのアウトラインの太さ(メートル・world space)。0で消える。実機live調整用(0.2mm刻み)。
      ui: { kind: slider, step: 0.0002, format: '{0:F4}m' }

    - name: HandSkinColorR
      label: 手モデル肌色R
      group: 手モデル
      type: float
      default: 1.0
      range: [0.0, 1.5]
      description: 手3Dモデルの肌色(R成分)。F10 でlive反映。shade色も連動して暗くなる(0.7倍/0.4倍の中間影/濃影)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: HandSkinColorG
      label: 手モデル肌色G
      group: 手モデル
      type: float
      default: 0.7
      range: [0.0, 1.5]
      description: 手3Dモデルの肌色(G成分)。F10 でlive反映。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: HandSkinColorB
      label: 手モデル肌色B
      group: 手モデル
      type: float
      default: 0.62
      range: [0.0, 1.5]
      description: 手3Dモデルの肌色(B成分)。F10 でlive反映。
      ui: { kind: slider, step: 0.01, format: '{0:F2}' }

    - name: HandMatCapIntensity
      label: 手モデルMatCap強度
      group: 手モデル
      type: float
      default: 0
      range: [0.0, 2.0]
      description: 手3DモデルのMatCap(球面ハイライト)強度。0で消える/2で最大強調。Cast由来matcap_skin texを使う。F10でlive反映。
      ui: { kind: slider, step: 0.05, format: '{0:F2}' }

    - name: BendFingers
      label: 指を曲げる
      group: 指ベンド
      type: bool
      default: true
      description: ハンドモデルの指をトリガー(人差し指)/グリップ(他4本)の押し込み量で曲げる。要skin済み手バンドル(再bake)。
      ui: { kind: toggle }

    - name: FingerCurlMaxDeg
      label: 指の最大曲げ角(度)
      group: 指ベンド
      type: float
      default: 68
      range: [0, 90]
      description: 人差し指(トリガー)と中・薬・小指(グリップ)の関節1つあたり最大曲げ角。実機で詰める。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: ThumbCurlMaxDeg
      label: 親指の最大曲げ角(度)
      group: 指ベンド
      type: float
      default: 12
      range: [0, 90]
      description: 親指(グリップ)の関節1つあたり最大曲げ角。親指は張り出すため他指と分離。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: FingerInitialCurlDeg
      label: 指の初期曲げ角(度)
      group: 指ベンド
      type: float
      default: 23
      range: [-20, 60]
      description: 人差し/中/薬/小指の入力0(指を離した状態)での各関節の曲げ角。最大曲げ角との間を押し込み量で補間。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: ThumbInitialCurlDeg
      label: 親指の初期曲げ角(度)
      group: 指ベンド
      type: float
      default: 0
      range: [-20, 60]
      description: 親指の入力0(離した状態)での各関節の曲げ角。親指の最大曲げ角との間を押し込み量で補間。
      ui: { kind: slider, step: 1, format: '{0:F0}°' }

    - name: FingerCurlSmoothTau
      label: 指の追従時定数(s)
      group: 指ベンド
      type: float
      default: 0.05
      range: [0, 0.5]
      description: 指の曲げ追従の平滑時定数(秒)。大きいほどゆっくり。0でパススルー(平滑なし)。
      ui: { kind: slider, step: 0.01, format: '{0:F2}s' }

    - name: ShowChekiCamera
      label: Cheki カメラ化
      group: Cheki カメラ
      type: bool
      default: true
      description: Cheki ミニゲーム中、利き手の手元モデルを iPhone（スマホ）に自動スワップする。終了で自動復帰。要 ShowControllerModel=ON。
      ui: { kind: toggle }

