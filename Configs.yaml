      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: ChekiScreenPosOffsetY
      label: 背面画面 位置Y(m)
      group: Cheki カメラ
      type: float
      default: 0.045
      range: [-0.3, 0.3]
      description: 背面ビューファインダ画面の位置補正Y(上+)。
