      default: 0.0
      range: [-0.3, 0.3]
      description: instax ビューファインダカメラの位置補正Y(上+)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: ChekiCamPosOffsetZ
      label: VFカメラ位置補正Z(m)
      group: Cheki カメラ
      type: float
      default: 0.0
      range: [-0.3, 0.3]
      description: instax ビューファインダカメラの位置補正Z(前+・レンズ前方)。
      ui: { kind: slider, step: 0.005, format: '{0:F3}m' }

    - name: ChekiCamRotOffsetX
