# Build and deploy the VitePress docs (BG2VR/docs) to GitHub Pages.
# Requires repo Settings -> Pages -> Source = "GitHub Actions".
name: Deploy Docs to Pages

on:
  # Run only when docs-related files change on main (BG2VR is a C#-first repo).
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  # Allow manual runs from the Actions tab (path filter does not apply here).
  workflow_dispatch:

# Least-privilege permissions for OIDC-based Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One production deployment at a time; never cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # Submodules are not needed for the docs build, so the default
        # (no-submodule) checkout is used for speed.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: npm ci
      - name: Build with VitePress
        run: npm run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
